<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7C3AED" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Glass shine overlay -->
  <rect x="32" y="32" width="448" height="224" rx="96" ry="96" fill="url(#shine)" opacity="0.3"/>
  
  <!-- Chat bubble shape behind text -->
  <ellipse cx="256" cy="248" rx="180" ry="140" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Sanskrit text भोः -->
  <text x="256" y="300" text-anchor="middle" font-family="'Noto Sans Devanagari', 'Mangal', sans-serif" font-size="200" font-weight="700" fill="white" filter="url(#glow)">भोः</text>
  
  <!-- Small chat dots at bottom -->
  <circle cx="210" cy="400" r="12" fill="rgba(255,255,255,0.5)"/>
  <circle cx="256" cy="400" r="12" fill="rgba(255,255,255,0.35)"/>
  <circle cx="302" cy="400" r="12" fill="rgba(255,255,255,0.2)"/>
</svg>